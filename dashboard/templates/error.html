{% extends "base.html" %}

{% block title %}Error - SOC Dashboard{% endblock %}

{% block content %}
<div class="row">
    <div class="col-12">
        <div class="text-center py-5">
            <i class="bi bi-exclamation-triangle text-danger" style="font-size: 5rem;"></i>
            <h1 class="mt-4">Oops! Something went wrong</h1>
            <p class="lead text-muted">{{ error }}</p>
            <a href="{{ url_for('index') }}" class="btn btn-primary mt-3">
                <i class="bi bi-house"></i> Return to Dashboard
            </a>
        </div>
    </div>
</div>
{% endblock %}
